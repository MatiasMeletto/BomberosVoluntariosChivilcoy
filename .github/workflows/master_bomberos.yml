# 📄 Documentación: https://github.com/Azure/webapps-deploy
name: Build and deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  DOTNET_VERSION: "8.0.x"
  PROJECT_PATH: "FireForce.Core/FireForce.Core.csproj"
  PUBLISH_PATH: "./publish"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🔧 Configurar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Cache de paquetes NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget

      - name: 🏗️ Compilar el proyecto
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release

      - name: 🚀 Publicar el proyecto
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --output ${{ env.PUBLISH_PATH }}

      - name: 📤 Subir artefacto para despliegue
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.PUBLISH_PATH }}
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: "Production"
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: 📥 Descargar artefacto del trabajo de compilación
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./app

      - name: ☁️ Desplegar en Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "bomberos"
          slot-name: "Production"
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_E5412DC5FC7648B698D15A1D3A7910EF }}
          package: ./app

  sync-branches:
    if: false
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔄 Sincronizar ramas colaborativas con detección de conflictos
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          branches=("")
          conflicts_found=false
          conflict_branches=()

          for branch in "${branches[@]}"; do
            echo "🔁 Actualizando $branch desde master"
            git checkout $branch

            if ! git merge origin/master --no-edit; then
              echo "⚠️ Conflicto detectado en $branch"
              echo "::warning file=.github/workflows/sync.yml,title=Conflicto en $branch::Se detectaron conflictos al intentar mergear master en $branch. Se requiere resolución manual."
              
              # Abortar el merge
              git merge --abort
              
              conflicts_found=true
              conflict_branches+=("$branch")
            else
              echo "✅ $branch actualizada exitosamente"
              git push origin $branch
            fi
          done

          if [ "$conflicts_found" = true ]; then
            echo ""
            echo "❌ Resumen: Se encontraron conflictos en las siguientes ramas:"
            printf '%s\n' "${conflict_branches[@]}"
            echo ""
            echo "Por favor, resuelve los conflictos manualmente ejecutando:"
            echo "  git checkout <rama>"
            echo "  git merge master"
            echo "  # Resolver conflictos"
            echo "  git commit"
            echo "  git push"
            
            # Crear un warning general
            echo "::warning title=Sincronización incompleta::Se encontraron conflictos en ${#conflict_branches[@]} rama(s). Revisa los warnings anteriores para más detalles."
            
            # Fallar el workflow para que sea visible
            exit 1
          fi

          echo "✅ Todas las ramas se sincronizaron correctamente"